# Display
CONFIG_ZMK_DISPLAY=y

# Bluetooth
CONFIG_BT_MAX_CONN=5
CONFIG_BT_MAX_PAIRED=5

# Deep sleep disabled (re-enable after all issues resolved)
CONFIG_ZMK_SLEEP=n

# Increase BLE TX power for better range
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Battery reporting
CONFIG_BATTERY_LEVEL_POINT=y
CONFIG_ZMK_BATTERY_REPORTING=y